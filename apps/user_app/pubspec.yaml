name: fieldup_user_app
description: FieldUp — sports booking platform for users

publish_to: none

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Local packages
  fieldup_core:
    path: ../../packages/core
  fieldup_design_system:
    path: ../../packages/design_system
  fieldup_supabase_client:
    path: ../../packages/supabase_client

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.7

  # Supabase
  supabase_flutter: ^2.5.3

  # Payments
  razorpay_flutter: ^1.3.5

  # Images
  cached_network_image: ^3.3.1

  # Local storage
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2

  # Notifications
  firebase_core: ^3.3.0
  firebase_messaging: ^15.1.0
  flutter_local_notifications: ^17.2.2

  # Location
  geolocator: ^11.0.0
  geocoding: ^3.0.0

  # Media
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0

  # Animations
  lottie: ^3.1.0
  shimmer: ^3.0.0

  # Utilities
  intl: ^0.19.0
  dio: ^5.7.0
  equatable: ^2.0.5
  uuid: ^4.4.2
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  flutter_lints: ^4.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
